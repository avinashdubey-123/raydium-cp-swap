<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="raydium-icon" href="src/assets/raydium-logo.svg">
    <title>Raydium</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- Ensure Buffer is available before modules load (prevents Buffer is not defined in deps) -->
      <script>
        // Minimal Buffer polyfill for browser runtime before modules load.
        // Provides Buffer.from and Buffer.alloc used by some libs (e.g., spl-token).
        if (typeof window !== 'undefined' && (!window.Buffer || typeof window.Buffer.from !== 'function')) {
          (function () {
            function BufferPoly() {}
            BufferPoly.from = function (input, encoding) {
              if (typeof input === 'string') {
                if (encoding === 'base64') {
                  var bin = atob(input);
                  var arr = new Uint8Array(bin.length);
                  for (var i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
                  return arr;
                }
                if (encoding === 'hex') {
                  var len = input.length / 2;
                  var a = new Uint8Array(len);
                  for (var j = 0; j < len; j++) a[j] = parseInt(input.substr(j * 2, 2), 16);
                  return a;
                }
                return new TextEncoder().encode(input);
              }
              if (input instanceof ArrayBuffer) return new Uint8Array(input);
              if (ArrayBuffer.isView(input)) return new Uint8Array(input.buffer, input.byteOffset, input.byteLength);
              return new Uint8Array(input);
            };
            BufferPoly.alloc = function (size) { return new Uint8Array(size); };
            window.Buffer = window.Buffer || BufferPoly;
          })();
        }
      </script>
      <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
